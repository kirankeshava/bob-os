openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Bob - Entrepreneur Agent API
servers:
  - url: /api
    description: Base API path
tags:
  - name: sync
    description: GitHub auto-sync status
  - name: health
    description: Health operations
  - name: businesses
    description: Business opportunities management
  - name: tasks
    description: Task management for business projects
  - name: comments
    description: Task comments and feedback
  - name: agents
    description: AI Agent operations
paths:
  /sync/status:
    get:
      operationId: getSyncStatus
      tags: [sync]
      summary: Get GitHub sync status
      description: Returns the status of the last GitHub auto-sync run
      responses:
        "200":
          description: Sync status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncStatus"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /businesses:
    get:
      operationId: listBusinesses
      tags: [businesses]
      summary: List all business opportunities
      responses:
        "200":
          description: List of businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Business"
    post:
      operationId: createBusiness
      tags: [businesses]
      summary: Create a new business opportunity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBusinessBody"
      responses:
        "201":
          description: Created business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"

  /businesses/{id}:
    get:
      operationId: getBusiness
      tags: [businesses]
      summary: Get a business by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Business details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
        "404":
          description: Not found
    patch:
      operationId: updateBusiness
      tags: [businesses]
      summary: Update a business
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBusinessBody"
      responses:
        "200":
          description: Updated business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
    delete:
      operationId: deleteBusiness
      tags: [businesses]
      summary: Delete a business
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /businesses/{id}/tasks:
    get:
      operationId: listBusinessTasks
      tags: [tasks]
      summary: List tasks for a business
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task for a business
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    get:
      operationId: getTask
      tags: [tasks]
      summary: Get a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task (status, details, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /tasks/{id}/comments:
    get:
      operationId: listTaskComments
      tags: [comments]
      summary: List comments for a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskComment"
    post:
      operationId: createTaskComment
      tags: [comments]
      summary: Add a comment to a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskCommentBody"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskComment"

  /businesses/{businessId}/site:
    get:
      operationId: getBusinessSite
      tags: [businesses]
      summary: Get business site configuration
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Business site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessSite"
        "404":
          description: Not found

  /businesses/{businessId}/site/public:
    get:
      operationId: getBusinessSitePublic
      tags: [businesses]
      summary: Get public site data (business + site + artifacts)
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Public site data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessSitePublic"
        "404":
          description: Not found

  /businesses/{businessId}/site/generate:
    post:
      operationId: generateBusinessSite
      tags: [businesses]
      summary: Generate or regenerate site content using AI and create AgentMail inbox
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessSite"
        "404":
          description: Business not found

  /businesses/{businessId}/inbox:
    get:
      operationId: getBusinessInbox
      tags: [businesses]
      summary: Get AgentMail inbox messages and log for a business
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Inbox data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessInbox"

  /businesses/{businessId}/inbox/send:
    post:
      operationId: sendBusinessEmail
      tags: [businesses]
      summary: Send an outreach email from the business inbox
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendEmailBody"
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  messageId:
                    type: string
                required:
                  - success
                  - messageId

  /businesses/{businessId}/inbox/log:
    get:
      operationId: getEmailLog
      tags: [businesses]
      summary: Get logged outreach emails for a business
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email log
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OutreachEmail"

  /businesses/{businessId}/inbox/onboard:
    post:
      operationId: onboardContact
      tags: [businesses]
      summary: Start an AI-generated onboarding email sequence for a contact
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardContactBody"
      responses:
        "200":
          description: Onboarding sequence created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  sequenceCount:
                    type: integer
                  emails:
                    type: array
                    items:
                      $ref: "#/components/schemas/OutreachEmail"
                required:
                  - success
                  - sequenceCount
                  - emails

  /businesses/{businessId}/ceo-review:
    get:
      operationId: getBusinessCeoReview
      tags: [businesses]
      summary: Get the latest CEO review for a business
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Latest CEO review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CeoReview"
        "404":
          description: No CEO review found

  /businesses/{businessId}/knowledge-base:
    get:
      operationId: listKnowledgeBaseEntries
      tags: [businesses]
      summary: List all knowledge base entries for a business
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of knowledge base entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KnowledgeBaseEntry"

  /businesses/{businessId}/knowledge-base/upload:
    post:
      operationId: uploadKnowledgeBaseFile
      tags: [businesses]
      summary: Upload a file to the knowledge base (PDF, DOCX, TXT)
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "201":
          description: Created knowledge base entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBaseEntry"

  /businesses/{businessId}/knowledge-base/url:
    post:
      operationId: ingestKnowledgeBaseUrl
      tags: [businesses]
      summary: Ingest a URL into the knowledge base
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestKnowledgeBaseUrlBody"
      responses:
        "201":
          description: Created knowledge base entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeBaseEntry"

  /businesses/{businessId}/knowledge-base/{entryId}:
    delete:
      operationId: deleteKnowledgeBaseEntry
      tags: [businesses]
      summary: Delete a knowledge base entry
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
        - name: entryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /businesses/{businessId}/artifacts:
    get:
      operationId: listBusinessArtifacts
      tags: [businesses]
      summary: List all artifacts for a business
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of artifacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BusinessArtifact"

  /businesses/{businessId}/performance:
    get:
      operationId: getBusinessPerformance
      tags: [businesses]
      summary: Get performance metrics for a business
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Performance metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessPerformance"
    patch:
      operationId: updateBusinessPerformance
      tags: [businesses]
      summary: Update performance metrics for a business
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBusinessPerformanceBody"
      responses:
        "200":
          description: Updated performance metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessPerformance"

  /businesses/{businessId}/performance/feedback:
    get:
      operationId: listCustomerFeedback
      tags: [businesses]
      summary: List customer feedback for a business
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of feedback entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerFeedback"
    post:
      operationId: createCustomerFeedback
      tags: [businesses]
      summary: Add customer feedback
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerFeedbackBody"
      responses:
        "201":
          description: Created feedback entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerFeedback"

  /businesses/{businessId}/performance/feedback/{feedbackId}:
    delete:
      operationId: deleteCustomerFeedback
      tags: [businesses]
      summary: Delete a customer feedback entry
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
        - name: feedbackId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /businesses/{businessId}/performance/competitors:
    get:
      operationId: listCompetitors
      tags: [businesses]
      summary: List competitors for a business
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of competitors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Competitor"
    post:
      operationId: createCompetitor
      tags: [businesses]
      summary: Add a competitor
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompetitorBody"
      responses:
        "201":
          description: Created competitor entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Competitor"

  /businesses/{businessId}/performance/competitors/{competitorId}:
    delete:
      operationId: deleteCompetitor
      tags: [businesses]
      summary: Delete a competitor entry
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
        - name: competitorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/agent-activity:
    get:
      operationId: getAgentActivity
      tags: [businesses]
      summary: Get all active agents grouped by business
      responses:
        "200":
          description: Active agent operations per business
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BusinessAgentActivity"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [businesses]
      summary: Get high-level dashboard summary
      responses:
        "200":
          description: Dashboard summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /agent/research:
    post:
      operationId: triggerResearch
      tags: [agents]
      summary: Trigger the AI research agent to find business ideas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriggerResearchBody"
      responses:
        "200":
          description: Research triggered, returns run ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunStatus"

  /agent/orchestrate/{businessId}:
    post:
      operationId: triggerOrchestrate
      tags: [agents]
      summary: Trigger the orchestrator agent to plan/update tasks for a business
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Orchestration triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRunStatus"

  /agent/runs:
    get:
      operationId: listAgentRuns
      tags: [agents]
      summary: List recent agent runs
      responses:
        "200":
          description: List of agent runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentRun"

  /agent/runs/{id}:
    get:
      operationId: getAgentRun
      tags: [agents]
      summary: Get status of a specific agent run
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent run details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRun"

components:
  schemas:
    CeoReview:
      type: object
      properties:
        id:
          type: integer
        businessId:
          type: integer
        mode:
          type: string
          enum: [wartime, peacetime]
        oneMetric:
          type: string
        oneMetricValue:
          type: string
        runwayStatus:
          type: string
          enum: [alive, at_risk, dead]
        topPriority:
          type: string
        summary:
          type: string
        weeklyRevenueTarget:
          type: string
          nullable: true
          description: CEO-set financial target for the next 7 days
        taskDirectives:
          type: string
          nullable: true
          description: JSON array of task priority directives set by the CEO
        createdAt:
          type: string
      required:
        - id
        - businessId
        - mode
        - oneMetric
        - oneMetricValue
        - runwayStatus
        - topPriority
        - summary
        - createdAt

    BusinessArtifact:
      type: object
      properties:
        id:
          type: integer
        businessId:
          type: integer
        taskId:
          type: ["integer", "null"]
        title:
          type: string
        content:
          type: string
        artifactType:
          type: string
          enum: [document, template, research, script, plan, copy, code, spreadsheet]
        agentType:
          type: ["string", "null"]
        createdBy:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - businessId
        - taskId
        - title
        - content
        - artifactType
        - agentType
        - createdBy
        - createdAt
        - updatedAt

    AgentTaskInfo:
      type: object
      properties:
        taskId:
          type: integer
        title:
          type: string
        agentType:
          type: ["string", "null"]
        assignedAgent:
          type: ["string", "null"]
        status:
          type: string
        priority:
          type: string
        updatedAt:
          type: string
      required:
        - taskId
        - title
        - agentType
        - assignedAgent
        - status
        - priority
        - updatedAt

    BusinessAgentActivity:
      type: object
      properties:
        businessId:
          type: integer
        businessName:
          type: string
        businessStatus:
          type: string
        activeTasks:
          type: array
          items:
            $ref: "#/components/schemas/AgentTaskInfo"
        totalTasks:
          type: integer
        openCount:
          type: integer
        inProgressCount:
          type: integer
        closedCount:
          type: integer
      required:
        - businessId
        - businessName
        - businessStatus
        - activeTasks
        - totalTasks
        - openCount
        - inProgressCount
        - closedCount

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Business:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        marketSize:
          type: string
        tam:
          type: string
        investmentNeeded:
          type: string
        targetRevenue30d:
          type: string
        effortLevel:
          type: string
          enum: [low, medium, high]
        platform:
          type: string
        status:
          type: string
          enum: [researching, planning, active, completed, paused]
        rank:
          type: integer
        costBenefitScore:
          type: ["number", "null"]
        marketDemandScore:
          type: ["number", "null"]
        agentNotes:
          type: ["string", "null"]
        emailInboxId:
          type: ["string", "null"]
        emailAddress:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - description
        - marketSize
        - tam
        - investmentNeeded
        - targetRevenue30d
        - effortLevel
        - platform
        - status
        - rank
        - costBenefitScore
        - marketDemandScore
        - agentNotes
        - emailInboxId
        - emailAddress
        - createdAt
        - updatedAt

    CreateBusinessBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        marketSize:
          type: string
        tam:
          type: string
        investmentNeeded:
          type: string
        targetRevenue30d:
          type: string
        effortLevel:
          type: string
          enum: [low, medium, high]
        platform:
          type: string
        rank:
          type: integer
        costBenefitScore:
          type: ["number", "null"]
        marketDemandScore:
          type: ["number", "null"]
        agentNotes:
          type: ["string", "null"]
      required:
        - name
        - description
        - marketSize
        - tam
        - investmentNeeded
        - targetRevenue30d
        - effortLevel
        - platform
        - rank

    UpdateBusinessBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        marketSize:
          type: string
        tam:
          type: string
        investmentNeeded:
          type: string
        targetRevenue30d:
          type: string
        effortLevel:
          type: string
          enum: [low, medium, high]
        platform:
          type: string
        status:
          type: string
          enum: [researching, planning, active, completed, paused]
        rank:
          type: integer
        costBenefitScore:
          type: ["number", "null"]
        marketDemandScore:
          type: ["number", "null"]
        agentNotes:
          type: ["string", "null"]

    Task:
      type: object
      properties:
        id:
          type: integer
        businessId:
          type: integer
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [open, in_progress, closed, waiting_approval]
        assignedAgent:
          type: ["string", "null"]
        agentType:
          type: ["string", "null"]
        priority:
          type: string
          enum: [low, medium, high, critical]
        estimatedHours:
          type: ["number", "null"]
        deliverables:
          type: ["string", "null"]
        dueDate:
          type: ["string", "null"]
        lastProgressUpdate:
