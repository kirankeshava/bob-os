kind = "web"
previewPath = "/"
title = "Bob - Entrepreneur Agent"
version = "1.0.0"
id = "artifacts/bob-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25175

[services.development]
run = "pnpm --filter @workspace/bob-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bob-dashboard", "run", "build" ]
publicDir = "artifacts/bob-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25175"
BASE_PATH = "/"
